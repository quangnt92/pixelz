version: "3.9"

services:

  # ── SQL Server ────────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA:  "Y"
      SA_PASSWORD:  "YourStrong!Passw0rd"
      MSSQL_PID:    "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa", "-P", "YourStrong!Passw0rd",
             "-C", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10

  # ── Pixelz API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/Pixelz.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: >-
        Server=sqlserver,1433;Database=PixelzDb;
        User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
      Serilog__LogDirectory: /app/logs
    ports:
      - "5000:8080"
    volumes:
      - logs:/app/logs  # persist log files on the host
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqldata:
  logs:
